<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow SLG</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">
    
<!-- 地图 -->
<img id="map" src="assets/scene/map.png" alt="地图">

<!-- 城主府 -->
<img id="hall" src="assets/scene/hall.png" alt="城主府">
<!-- 城主府弹窗 -->
<div id="hall-popup">
    <h2>🏯 城主府</h2>

    <p>当前等级：<span id="hallLevel">1</span></p>

    <p>🌲 木材：<span id="wood">5000</span></p>

    <p>🌾 粮食：<span id="food">6000</span></p>

    <button id="upgradeBtn">升级</button>
    <button id="closeBtn">关闭</button>
</div>
    <!-- 玩家信息 -->
    <div class="player-card">

        <div class="avatar">
            <img src="assets/avatar/avatar.png" alt="头像">
        </div>

        <div class="player-info">
            <div class="name">君主 · EthanQ</div>
            <div class="level">Lv.18</div>
            <div class="power">👑 268,520</div>
        </div>

        <div class="vip">VIP 6</div>

    </div>

    <!-- 顶部资源 -->
    <div class="resource-bar">

        <div class="resource">
            🌾 <span>125.6万</span>
        </div>

        <div class="resource">
            🌲 <span>98.7万</span>
        </div>

        <div class="resource">
            ⛏ <span>64.3万</span>
        </div>

        <div class="resource">
            🪨 <span>87.2万</span>
        </div>

        <div class="resource">
            💰 <span>12860</span>
        </div>

        <div class="resource">
            💎 <span>3288</span>
        </div>

     </div>

  <!-- 左侧任务 -->
<div class="task-panel">
    <div class="task-title">📜 主线任务</div>

    <div class="task-item">
        升级城主府到 Lv.2
    </div>

    <div class="task-item">
        征兵 1 次
    </div>

    <div class="task-item">
        收集资源 2 次
    </div>

    <button class="task-btn">查看全部</button>
</div>

<!-- 左下功能 -->
<div class="left-menu">
    <button>📧<br>邮件</button>
    <button>📋<br>任务</button>
    <button>🎁<br>签到</button>
</div>

<!-- 右上快捷入口 -->
<div class="right-menu">
    <button>🎁<br>首充</button>
    <button>🎉<br>活动</button>
    <button>🎁<br>福利</button>
    <button>🏪<br>商城</button>
</div>

<!-- 右侧队列 -->
<div class="queue-panel">
    <button>🔨 建造队列</button>
    <button>📖 研究队列</button>
    <button>🪖 训练队列</button>
</div>

<!-- 世界聊天 -->
<div class="chat-box">
    <div>[世界] 欢迎来到 Snow SLG！</div>
    <div>[联盟] 今天继续努力发展！</div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
    <button>🧙<br>武将</button>
    <button>🎒<br>背包</button>
    <button>🛡<br>征兵</button>
    <button>🏰<br>联盟</button>
    <button>📚<br>科技</button>
    <button>☰<br>更多</button>
</div>

<!-- 出征 -->
<button class="march-btn">
    ⚔<br>出征
</button>
</div>

<script src="script.js"></script>

</body>
</html>
