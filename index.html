<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow SLG</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

    <!-- 主城背景 -->
    <img id="city" src="assets/scene/city.png" alt="主城">

    <!-- 玩家信息 -->
    <div class="player-card">

        <div class="avatar">
            <img src="assets/avatar/avatar.png" alt="头像">
        </div>

        <div class="player-info">
            <div class="name">君主 · EthanQ</div>
            <div class="level">Lv.18</div>
            <div class="power">👑 268,520</div>
        </div>

        <div class="vip">VIP 6</div>

    </div>

    <!-- 顶部资源 -->
    <div class="resource-bar">

        <div class="resource">
            🌾 <span>125.6万</span>
        </div>

        <div class="resource">
            🌲 <span>98.7万</span>
        </div>

        <div class="resource">
            ⛏ <span>64.3万</span>
        </div>

        <div class="resource">
            🪨 <span>87.2万</span>
        </div>

        <div class="resource">
            💰 <span>12860</span>
        </div>

        <div class="resource">
            💎 <span>3288</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
