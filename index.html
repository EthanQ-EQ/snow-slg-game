<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snow SLG</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

    <!-- 主城 -->
    <img id="city" src="assets/scene/city.png">

    <!-- 顶部资源栏 -->
    <div id="topBar">

        <div class="player">
            👤 Ethan
        </div>

        <div class="resource">🪵12500</div>
        <div class="resource">🌾8888</div>
        <div class="resource">🪨5600</div>
        <div class="resource">💰9999</div>

    </div>

    <!-- 底部菜单 -->
    <div id="bottomBar">

        <button>🏰<br>主城</button>

        <button>⚔<br>武将</button>

        <button>🎒<br>背包</button>

        <button>🌍<br>地图</button>

        <button>☰<br>更多</button>

    </div>

<div id="game">

    <!-- 主城 -->
    <img id="city" src="assets/scene/city.png">

    <!-- 左上玩家 -->
    <div class="player-card">

        <div class="avatar">
            <img src="assets/avatar/avatar.png">
        </div>

        <div class="player-info">

            <div class="name">
                君主 · EthanQ
            </div>

            <div class="level">
                LV.18
            </div>

            <div class="power">
                👑 268520
            </div>

        </div>

        <div class="vip">
            VIP6
        </div>

    </div>

    <!-- 顶部资源 -->
    <div class="resource-bar">

        <div class="resource">
            🌾
            <span>125.6万</span>
        </div>

        <div class="resource">
            🌲
            <span>98.7万</span>
        </div>

        <div class="resource">
            ⛏
            <span>64.3万</span>
        </div>

        <div class="resource">
            🪨
            <span>87.2万</span>
        </div>

        <div class="resource">
            💰
            <span>12860</span>
        </div>

    </div>

</div>
<script src="script.js"></script>

</body>
</html>
